<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 👇 朋友圈/微信分享卡片（必须加） -->
<title>我的私人音乐播放器</title>
<meta property="og:title" content="我的私人音乐播放器">
<meta property="og:description" content="点开直接听 · We Choose To Go To The Moon等">
<meta property="og:image" content="https://picsum.photos/seed/music/300/300">
<meta property="og:url" content="https://lightarea2019-collab.github.io/music-player/">
<meta property="og:type" content="music.playlist">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
<style>
body{margin:0;background:#f5f5f5;padding:20px;}
</style>
</head>
<body>
<div id="aplayer"></div>

<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
<script>
const ap = new APlayer({
    container: document.getElementById('aplayer'),
    listFolded: false,
    loop: 'all',
    audio: [
        {
            name: "We Choose To Go To The Moon",
            artist: "Khartom",
            url: "https://raw.githubusercontent.com/lightarea2019-collab/music-player/main/We%20Choose%20To%20Go%20To%20The%20Moon.mp3",
            cover: "https://picsum.photos/300/300"
        },
        {
            name: "Taijin Kyofusho",
            artist: "歌手",
            url: "https://raw.githubusercontent.com/lightarea2019-collab/music-player/main/Taijin%20Kyofusho.mp3",
            cover: "https://picsum.photos/300/300"
        },
        {
            name: "A Lovely Wedding",
            artist: "Windsor Airlift",
            url: "https://raw.githubusercontent.com/lightarea2019-collab/music-player/main/A%20Lovely%20Wedding%20-%20Snow%20and%20Sky",
            cover: "https://picsum.photos/300/300"
        }
    ]
});
</script>
</body>
</html>
